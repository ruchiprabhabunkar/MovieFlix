<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - MovieFlix</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Specific styles for the signup page, integrating with style.css */
        .signup-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 40px; /* offset for navbar and padding */
            position: relative;
            z-index: 10;
        }
        
        .signup-box {
            background-color: rgba(17, 24, 39, 0.85); /* --card-bg with opacity */
            padding: 3rem 4rem;
            border-radius: 8px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(55, 65, 81, 0.5); /* --border */
        }

        .signup-box h2 {
            font-size: 2rem;
            margin-top: 0;
            margin-bottom: 2rem;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-group input {
            width: 100%;
            height: 60px;
            padding: 1.5rem 1rem 0.5rem 1rem;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 4px;
            color: #fff;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus {
            border-color: var(--primary);
            background: #374151;
        }

        .form-group label {
            position: absolute;
            top: 50%;
            left: 1rem;
            transform: translateY(-50%);
            color: #9ca3af;
            pointer-events: none;
            transition: 0.2s ease all;
            font-size: 1rem;
        }

        .form-group input:focus + label,
        .form-group input:not(:placeholder-shown) + label {
            top: 14px;
            transform: translateY(0);
            font-size: 0.75rem;
            color: #d1d5db;
        }
        
        .genre-selection {
            margin-bottom: 2.5rem;
        }

        .genre-selection p {
            color: #9ca3af;
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }

        .genre-grid-signup {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .genre-checkbox {
            display: none;
        }

        .genre-label {
            background: #1f2937;
            border: 1px solid #374151;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #d1d5db;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            user-select: none;
        }

        .genre-label:hover {
            background: #374151;
        }

        .genre-checkbox:checked + .genre-label {
            background: rgba(229, 9, 20, 0.2);
            border-color: var(--primary);
            color: #fff;
        }

        .signup-btn {
            width: 100%;
            padding: 1rem;
            font-size: 1.05rem;
            margin-bottom: 1.5rem;
        }

        .signup-footer {
            color: #9ca3af;
            font-size: 0.95rem;
        }

        .signup-footer a {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
        }

        .signup-footer a:hover {
            text-decoration: underline;
            color: var(--primary);
        }

        /* Mobile Responsiveness for Form */
        @media (max-width: 600px) {
            .signup-box {
                padding: 2.5rem 2rem;
            }
        }
    </style>
</head>
<body>

    <!-- Background Layer (Reused from Index) -->
    <div class="hero-overlay" style="z-index: -1; position: fixed;"></div>
    <img class="hero-bg" src="https://image.tmdb.org/t/p/original/orjiB3oUIsyz60hoEqkiGpy5CeO.jpg" alt="Background" style="z-index: -2; position: fixed;">

    <!-- Navigation Bar -->
    <header class="navbar">
        <div class="nav-left">
            <div class="logo">Movie<span>Flix</span></div>
        </div>
        <div class="nav-right">
            <a href="index.html" class="btn-outline" style="text-decoration: none;">Home</a>
        </div>
    </header>

    <!-- Sign Up Form -->
    <div class="signup-container">
        <div class="signup-box">
            <h2>Sign Up</h2>
            <form id="signupForm" action="signIn.html">
                <div class="form-group">
                    <input type="text" id="username" placeholder=" " required>
                    <label for="username">Username</label>
                </div>        
                <div class="form-group">
                    <input type="email" id="email" placeholder=" " required>
                    <label for="email">Email address</label>
                </div>              
                <div class="form-group">
                    <input type="password" id="password" placeholder=" " required>
                    <label for="password">Password</label>
                </div>
                <div class="genre-selection">
                    <p>What types of movies do you like?</p>
                    <div class="genre-grid-signup">
                        <input type="checkbox" id="genre-action" class="genre-checkbox" value="Action">
                        <label for="genre-action" class="genre-label"><i class="fa-solid fa-fire" style="color: #ef4444;"></i> Action</label>

                        <input type="checkbox" id="genre-comedy" class="genre-checkbox" value="Comedy">
                        <label for="genre-comedy" class="genre-label"><i class="fa-regular fa-face-smile" style="color: #eab308;"></i> Comedy</label>

                        <input type="checkbox" id="genre-drama" class="genre-checkbox" value="Drama">
                        <label for="genre-drama" class="genre-label"><i class="fa-solid fa-masks-theater" style="color: #3b82f6;"></i> Drama</label>

                        <input type="checkbox" id="genre-horror" class="genre-checkbox" value="Horror">
                        <label for="genre-horror" class="genre-label"><i class="fa-solid fa-ghost" style="color: #22c55e;"></i> Horror</label>

                        <input type="checkbox" id="genre-scifi" class="genre-checkbox" value="Sci-Fi">
                        <label for="genre-scifi" class="genre-label"><i class="fa-solid fa-rocket" style="color: #06b6d4;"></i> Sci-Fi</label>
                        
                        <input type="checkbox" id="genre-romance" class="genre-checkbox" value="Romance">
                        <label for="genre-romance" class="genre-label"><i class="fa-solid fa-heart" style="color: #ec4899;"></i> Romance</label>
                    </div>
                </div>
                <button type="submit" class="btn-primary signup-btn">Sign Up</button>
                <p id="message"></p>
                <div class="signup-footer">
                    Already have an account? <a href="signIn.html">Sign in now.</a>
                </div>
            </form>
        </div>
    </div>


    <script>


 const genereItems = document.querySelectorAll(".genre-label");

 
  let selectedGeneric = [];

  genereItems.forEach(item => {
    item.addEventListener("click", ()=>{

        item.classList.toggle("active");

        const genere = item.innerText;
      
        

        if(selectedGeneric.includes(genere)){
            selectedGeneric = selectedGeneric.filter( g => g !== genere);
        } else{
            selectedGeneric.push(genere)
        }
    });
  });


        // signup-form 
   const sigupForm = document.getElementById("signupForm");
   sigupForm.addEventListener("submit",(e)=>{
    e.preventDefault();
    const username = document.getElementById("username").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value
    const user = {
        username,
        email,
        password,
        favGenere: selectedGeneric
    };

    localStorage.setItem(
        "movieflixUser",
        JSON.stringify(user)
    );

    document.getElementById("message").innerText = "Signup Successful"
    setTimeout(()=>{
      window.location.href ="signIn.html";
    }, 1000)


  });


    </script>

</body>
</html>
